jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t $DOCKER_USER/backend:latest ./springboot/app

      - name: Build frontend image
        run: docker build -t $DOCKER_USER/frontend:latest ./angular-app

      - name: Push backend image
        run: docker push $DOCKER_USER/backend:latest

      - name: Push frontend image
        run: docker push $DOCKER_USER/frontend:latest

      - name: Run application
        run: |
          docker compose up -d
          docker ps
